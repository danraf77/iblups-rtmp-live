listen              1935;
max_connections     10000;
srs_log_level       warn;
daemon              off;

# Performance tuning

srs_log_file        ./objs/srs.log;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost 141.94.207.173 {
    tcp_nodelay     on;
    min_latency     on;

    publish {
        mr          off;
    }

    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:3000/api/on_publish;
        on_unpublish    http://127.0.0.1:3000/api/on_unpublish;
    }

    # Forward dinámico gestionado por el Go backend (requerido para usar tokens)
    forward {
        enabled     on;
        backend     http://127.0.0.1:3000/api/on_forward;
    }
}

vhost __defaultVhost__ {
    tcp_nodelay     on;
    min_latency     on;

    publish {
        mr          off;
    }

    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:3000/api/on_publish;
        on_unpublish    http://127.0.0.1:3000/api/on_unpublish;
    }

    # Forward dinámico gestionado por el Go backend (requerido para usar tokens)
    forward {
        enabled     on;
        backend     http://127.0.0.1:3000/api/on_forward;
    }
}
