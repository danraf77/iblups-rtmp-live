listen              1935;
max_connections     10000;
srs_log_level       warn;
srs_log_tank        console;
daemon              off;
srs_log_level       trace;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         off;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

vhost 51.210.109.197 {
    tcp_nodelay     on;
    security {
    enabled         on;
    allow           publish     141.94.207.173;
    allow           publish     190.237.33.189;
    allow           play        all;
    }
    transcode live {
        enabled     on;
        ffmpeg      /usr/bin/ffmpeg;
        engine snapshot {
            enabled         on;
            iformat         flv;
            vfilter {
                vf fps=1/120,scale=480:270:flags=bilinear;
            }
            vcodec          png;
            vparams {
                update      1;
            }
            acodec          an;
            oformat         image2;
            output          ./objs/nginx/html/[stream].png;
        }
    }
}
vhost __defaultVhost__ {
    tcp_nodelay     on;
    security {
    enabled         on;
    allow           publish     141.94.207.173;
    allow           publish     190.237.33.189;
    allow           play        all;
    }

    transcode live {
        enabled     on;
        ffmpeg      /usr/bin/ffmpeg;
        engine snapshot {
            enabled         on;
            iformat         flv;
            vfilter {
                vf fps=1/120,scale=480:270:flags=bilinear;
            }
            vcodec          png;
            vparams {
                update      1;
            }
            acodec          an;
            oformat         image2;
            output          ./objs/nginx/html/[stream].png;
        }
    }
}