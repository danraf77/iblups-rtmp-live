listen              1935;
max_connections     10000;
srs_log_level       warn;
daemon              off;

# Performance tuning para Thumbnailing (alto CPU)
work_dir            ./objs;
pid                 ./objs/srs.pid;
srs_log_file        ./objs/srs.log;
workers             12;
work_threads        12;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         off;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

vhost __defaultVhost__ {
    tcp_nodelay     on;
    
    # Motor Transcoder para capturar Miniaturas (Thumbnail JPG) usando ffmpeg
    transcode live {
        enabled     on;
        ffmpeg      /usr/bin/ffmpeg;
        engine snapshot {
            enabled         on;
            vfilter {
                # Equivalente a Go Ticker: 1 frame cada 120 segundos (2 minutos) y escala optimizada (Firma: Cursor)
                vf fps=1/120,scale=245:142:flags=bilinear;
            }
            # Equivalente a "-vcodec mjpeg"
            vcodec          mjpeg;
            vparams {
                # Force overwriting the same file without asking prompts
                update 1;
                # Calidad balanceada
                qscale:v 4;
            }
            acodec          an;  # No procesar audio
            oformat         image2;
            # output must exactly match mapped volume in Docker
            output          ./objs/nginx/html/[stream].jpg;
        }
    }
}