services:
  srs-thumbnail:
    build: .
    container_name: iblups-srs-thumbnail
    restart: unless-stopped
    network_mode: "host"
    command: ./objs/srs -c conf/srs.conf
    volumes:
      - ./srs-thumb.conf:/usr/local/srs/conf/srs.conf:ro
      - srs-data:/usr/local/srs/objs/nginx/html
    healthcheck:
      test: [ "CMD", "curl", "-s", "-f", "http://127.0.0.1:1985/api/v1/versions" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '10.0'
          memory: 10g

  nginx-thumbnail-edge:
    image: nginx:alpine
    container_name: iblups-thumbnail-nginx
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Carpeta compartida donde SRS escribe los thumbnails JPG
      - srs-data:/usr/local/srs/objs/nginx/html:ro
    depends_on:
      srs-thumbnail:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2g

volumes:
  srs-data:
