listen              1935;
max_connections     10000;
srs_log_level       warn;
daemon              off;

pid                 /usr/local/srs/objs/srs.pid;
srs_log_file        /usr/local/srs/objs/srs.log;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         off;
    listen          8080;
    dir             /usr/local/srs/objs/nginx/html;
    crossdomain     on;
}

vhost __defaultVhost__ {
    tcp_nodelay     on;
    
    hls {
        enabled         on;
        hls_fragment    4;
        hls_window      20;
        hls_path        /usr/local/srs/objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        hls_cleanup     on;
    }
    
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}

vhost 51.210.109.197 {
    tcp_nodelay     on;
    
    hls {
        enabled         on;
