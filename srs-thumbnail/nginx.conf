worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;

    # HTTP — default (puerto 80, acceso por IP)
    server {
        listen 80 default_server;
        server_name _;

        root /usr/local/srs/objs/nginx/html;
        access_log off;

        location / {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }

            try_files $uri $uri/ =404;
        }

        # Thumbnails PNG
        location ~ ^/live/(.+\.png)$ {
            alias /usr/local/srs/objs/nginx/html/$1;

            add_header Cache-Control "public, max-age=5, s-maxage=5";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTP — thumbnail.iblups.com: ACME challenge + redirect to HTTPS
    server {
        listen 80;
        server_name thumbnail.iblups.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name thumbnail.iblups.com;

        ssl_certificate     /etc/letsencrypt/live/thumbnail.iblups.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/thumbnail.iblups.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/local/srs/objs/nginx/html;
        access_log off;
        error_log /var/log/nginx/error.log warn;

        location / {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }

            try_files $uri $uri/ =404;
        }

        # Thumbnails PNG
        location ~ ^/live/(.+\.png)$ {
            alias /usr/local/srs/objs/nginx/html/$1;

            add_header Cache-Control "public, max-age=5, s-maxage=5";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
