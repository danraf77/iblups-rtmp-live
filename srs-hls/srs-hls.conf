listen              1935;
max_connections     10000;
srs_log_level       warn;
daemon              off;

# Performance tuning for 16vCore
work_dir            ./objs;
pid                 ./objs/srs.pid;
srs_log_file        ./objs/srs.log;
workers             12;
work_threads        12;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         off;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

vhost __defaultVhost__ {
    tcp_nodelay     on;
    
    # HLS Generation Configuration
    hls {
        enabled         on;
        hls_fragment    4;    # Cada segmento de video dura 4 segundos
        hls_window      20;   # Mantener lista de reproducción de 20s (5 fragmentos aprox) en .m3u8
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        hls_cleanup     on;   # Eliminar .ts viejos automáticamente
    }
    
    # OPCIONAL: Generar salida HTTP-FLV para ultra-baja latencia (si se llega a usar)
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}
