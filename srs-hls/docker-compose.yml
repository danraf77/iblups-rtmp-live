services:
  srs-hls:
    build: .
    container_name: iblups-srs-hls
    restart: unless-stopped
    network_mode: "host"
    entrypoint: >
      sh -c "rm -f /usr/local/srs/objs/srs.pid &&
             exec /usr/local/srs/objs/srs -c /usr/local/srs/conf/srs.conf"
    volumes:
      - ./srs-hls.conf:/usr/local/srs/conf/srs.conf:ro
      - srs-data:/usr/local/srs/objs/nginx/html
    healthcheck:
      test: [ "CMD", "curl", "-s", "-f", "http://127.0.0.1:1985/api/v1/versions" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '10.0'
          memory: 10G

  nginx-cdn-edge:
    image: nginx:alpine
    container_name: iblups-hls-nginx
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - srs-data:/usr/local/srs/objs/nginx/html:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      srs-hls:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G

  certbot:
    image: certbot/certbot
    container_name: iblups-certbot
    restart: unless-stopped
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  srs-data:
  certbot-webroot:
  certbot-certs:
