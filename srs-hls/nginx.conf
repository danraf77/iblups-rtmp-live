worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;
    map_hash_bucket_size 128;

    map $http_user_agent $blocked_app {
        default     0;
        ~*vlc       1;
        ~*ffmpeg    1;
        ~*ffprobe   1;
        ~*python    1;
        ~*mpv       1;
        ~*libmpv    1;
        ~*lavf      1;
        ~*kodi      1;
    }

    map $http_referer $deny_referer {
        default                                 1;
        ""                                      0;
        "~*^https?://([^/]*\.)?iblups\.com"     0;
        "~*^https?://([^/]*\.)?cdnlivecdn\.com" 0;
        "~*^https?://([^/]*\.)?livepush\.io"    0;
        "~*^https?://iblups3-danraf77-gmailcoms-projects\.vercel\.app" 0;
        "~*^https?://localhost"                 0;
        "~*^https?://127\.0\.0\.1"              0;
    }

    map $http_origin $cors_origin {
        default                         "*";
        "https://iblups.com"            $http_origin;
        "http://iblups.com"             $http_origin;
        "https://www.iblups.com"        $http_origin;
        "https://cdnlivecdn.com"        $http_origin;
        "http://cdnlivecdn.com"         $http_origin;
        "https://www.cdnlivecdn.com"    $http_origin;
        "https://livepush.io"           $http_origin;
        "http://livepush.io"            $http_origin;
        "https://www.livepush.io"       $http_origin;
        "https://iblups3-danraf77-gmailcoms-projects.vercel.app" $http_origin;
        "http://localhost:3000"         $http_origin;
        "http://127.0.0.1:3000"         $http_origin;
    }

    # HTTP: redirige a HTTPS y sirve el challenge de Let's Encrypt
    server {
        listen 80;
        server_name live.cdnlivecdn.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: sirve el HLS con SSL
    server {
        listen 443 ssl;
        server_name live.cdnlivecdn.com;

        ssl_certificate     /etc/letsencrypt/live/live.cdnlivecdn.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/live.cdnlivecdn.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        root /usr/local/srs/objs/nginx/html;
        access_log off;
        error_log /var/log/nginx/error.log warn;

        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                     ts;
            text/html                      html;
        }

        location ~ \.m3u8$ {
            if ($blocked_app = 1) { return 403; }
            if ($deny_referer = 1) { return 403; }

            add_header Cache-Control                "no-cache, no-store, must-revalidate" always;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Vary                         "Origin" always;
            try_files $uri =404;
        }

        location ~ \.ts$ {
            if ($blocked_app = 1) { return 403; }
            if ($deny_referer = 1) { return 403; }

            add_header Cache-Control                "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Vary                         "Origin" always;
            try_files $uri =404;
        }

        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Max-Age       86400;
                add_header Content-Length               0;
                return 204;
            }
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
