worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;
    map_hash_bucket_size 128;

    # --- Anti-DDoS: rate limiting ---
    # Limitar requests por IP: 20 req/seg para .m3u8, 50 req/seg para .ts
    limit_req_zone $binary_remote_addr zone=hls_m3u8:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=hls_ts:10m rate=100r/s;

    # Limitar conexiones simultáneas por IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Responder 429 en vez de 503 cuando se excede el límite
    limit_req_status 429;
    limit_conn_status 429;

    # No loguear los 429 para no saturar disco
    map $status $log_not_429 {
        429     0;
        default 1;
    }

    map $http_user_agent $blocked_app {
        default     0;
        ~*vlc       1;
        ~*ffmpeg    1;
        ~*ffprobe   1;
        ~*python    1;
        ~*mpv       1;
        ~*libmpv    1;
        ~*lavf      1;
        ~*kodi      1;
    }

    # Para puerto 80 (Bunny) - permite referer vacío
    map $http_referer $deny_referer_bunny {
        default                                 1;
        ""                                      0;
        "~*^https?://([^/]*\.)?iblups\.com"     0;
        "~*^https?://([^/]*\.)?cdnlivecdn\.com" 0;
        "~*^https?://([^/]*\.)?livepush\.io"    0;
        "~*^https?://([^/]*\.)?escuela4\.com"   0;
        "~*^https?://iblups3-danraf77-gmailcoms-projects\.vercel\.app" 0;
        "~*^https?://localhost"                 0;
        "~*^https?://127\.0\.0\.1"              0;
    }

    # Para puerto 443 (sc2 directo) - bloquea referer vacío
    map $http_referer $deny_referer_direct {
        default                                 1;
        "~*^https?://([^/]*\.)?iblups\.com"     0;
        "~*^https?://([^/]*\.)?cdnlivecdn\.com" 0;
        "~*^https?://([^/]*\.)?livepush\.io"    0;
        "~*^https?://([^/]*\.)?escuela4\.com"   0;
        "~*^https?://iblups3-danraf77-gmailcoms-projects\.vercel\.app" 0;
        "~*^https?://localhost"                 0;
        "~*^https?://127\.0\.0\.1"              0;
    }

    # HTTP — Origin para Bunny CDN (acceso por IP en puerto 80)
    server {
        listen 80 default_server;
        server_name _;

        root /usr/local/srs/objs/nginx/html;
        access_log off;
        error_log /var/log/nginx/error.log warn;

        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                     ts;
            text/html                      html;
        }

        location ~ \.m3u8$ {
            if ($blocked_app = 1) { return 403; }
            if ($deny_referer_bunny = 1) { return 403; }

            add_header Cache-Control                "public, max-age=2" always;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            try_files $uri =404;
        }

        location ~ \.ts$ {
            if ($blocked_app = 1) { return 403; }
            if ($deny_referer_bunny = 1) { return 403; }

            add_header Cache-Control                "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            try_files $uri =404;
        }

        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Max-Age       86400;
                add_header Content-Length               0;
                return 204;
            }
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTP — sc2.escuela4.com: ACME challenge + redirect to HTTPS
    server {
        listen 80;
        server_name sc2.escuela4.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name sc2.escuela4.com;

        ssl_certificate     /etc/letsencrypt/live/sc2.escuela4.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sc2.escuela4.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/local/srs/objs/nginx/html;
        access_log off;
        error_log /var/log/nginx/error.log warn;

        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp2t                     ts;
            text/html                      html;
        }

        location ~ \.m3u8$ {
            if ($blocked_app = 1) { return 403; }
            if ($deny_referer_direct = 1) { return 403; }

            limit_req zone=hls_m3u8 burst=50 nodelay;
            limit_conn conn_per_ip 50;

            add_header Cache-Control                "public, max-age=2" always;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            try_files $uri =404;
        }

        location ~ \.ts$ {
            if ($blocked_app = 1) { return 403; }
            if ($deny_referer_direct = 1) { return 403; }

            limit_req zone=hls_ts burst=150 nodelay;
            limit_conn conn_per_ip 50;

            add_header Cache-Control                "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            try_files $uri =404;
        }

        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Max-Age       86400;
                add_header Content-Length               0;
                return 204;
            }
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}