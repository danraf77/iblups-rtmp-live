server {
    listen 80;
    server_name _;
    
    # Ruta donde SRS genera los archivos HLS
    root /usr/local/srs/objs/nginx/html;
    
    # Desactivar logs de acceso para no consumir excesiva I/O (ya que recibiremos mucho tráfico del CDN)
    access_log off;

    # Cabeceras CORS por defecto (necesarias para reproductores web como Video.js)
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
    
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
        try_files $uri $uri/ =404;
    }

    # Playlists M3U8: Sin caché. La CDN siempre debe pedir la versión fresca al origen (Bypass CDN Cache).
    location ~ \.m3u8$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl m3u8;
        }
    }

    # Fragmentos TS: Caché largo (1 día). Los fragmentos de video nunca cambian una vez generados.
    location ~ \.ts$ {
        # Instruye a Cloudflare a mantener el video en su borde permanentemente
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin *;
        types {
            video/mp2t ts;
        }
    }
}
